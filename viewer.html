<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أرشيف البناء — محمي</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.container { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 32px; width: 90%; max-width: 500px; text-align: center; }
h1 { font-size: 18pt; color: #1e293b; margin-bottom: 8px; }
p { color: #64748b; font-size: 10pt; margin-bottom: 24px; }
input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 11pt; outline: none; transition: border-color .2s; }
input:focus { border-color: #6366f1; }
button { margin-top: 16px; width: 100%; padding: 12px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 11pt; font-weight: 600; cursor: pointer; transition: background .2s; }
button:hover { background: #4f46e5; }
button:disabled { background: #94a3b8; cursor: not-allowed; }
.error { color: #dc2626; font-size: 9pt; margin-top: 12px; display: none; }
.spinner { display: none; margin: 16px auto; width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container" id="loginBox">
  <h1>🔐 أرشيف البناء الرقمي</h1>
  <p>هذا الملف محمي بكلمة مرور. أدخل كلمة المرور للمشاهدة.</p>
  <input type="password" id="passwordInput" placeholder="كلمة المرور" autocomplete="off">
  <button id="unlockBtn" onclick="unlock()">فتح الأرشيف</button>
  <div class="error" id="errorMsg">❌ كلمة المرور خاطئة</div>
  <div class="spinner" id="spinner"></div>
</div>
<div class="container" id="contentBox" style="display:none; max-width:800px; text-align:right;">
  <iframe id="archiveFrame" style="width:100%; height:80vh; border:none; border-radius:8px;"></iframe>
</div>
<script>
const SALT_SIZE = 16, IV_SIZE = 12, TAG_SIZE = 16, ITERATIONS = 100000;

function base64ToBytes(b64) {
  const bin = atob(b64);
  return Uint8Array.from(bin, c => c.charCodeAt(0));
}
function bytesToBase64(bytes) {
  return btoa(String.fromCharCode(...bytes));
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: ITERATIONS, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
}

async function decrypt(encryptedB64, password) {
  const data = base64ToBytes(encryptedB64);
  const salt = data.slice(0, SALT_SIZE);
  const iv = data.slice(SALT_SIZE, SALT_SIZE + IV_SIZE);
  const tag = data.slice(data.length - TAG_SIZE);
  const ct = data.slice(SALT_SIZE + IV_SIZE, data.length - TAG_SIZE);
  const key = await deriveKey(password, salt);
  const combined = new Uint8Array([...ct, ...tag]);
  const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, combined);
  return new TextDecoder().decode(dec);
}

async function unlock() {
  const pw = document.getElementById('passwordInput').value;
  const btn = document.getElementById('unlockBtn');
  const err = document.getElementById('errorMsg');
  const spin = document.getElementById('spinner');
  if (!pw) { err.style.display = 'block'; err.textContent = '❌ الرجاء إدخال كلمة المرور'; return; }
  btn.disabled = true; err.style.display = 'none'; spin.style.display = 'block';

  const params = new URLSearchParams(window.location.search);
  const dataUrl = params.get('data') || '';
  if (!dataUrl) {
    err.style.display = 'block'; err.textContent = '❌ رابط البيانات مفقود'; btn.disabled = false; spin.style.display = 'none';
    return;
  }

  try {
    const resp = await fetch(dataUrl);
    if (!resp.ok) throw new Error('فشل تحميل الملف');
    const encryptedB64 = await resp.text();
    const html = await decrypt(encryptedB64.trim(), pw);
    document.getElementById('loginBox').style.display = 'none';
    const frame = document.getElementById('archiveFrame');
    frame.srcdoc = html;
    document.getElementById('contentBox').style.display = 'block';
  } catch(e) {
    err.textContent = '❌ كلمة المرور خاطئة أو الملف تالف';
    err.style.display = 'block';
  }
  btn.disabled = false; spin.style.display = 'none';
}
</script>
</body>
</html>
